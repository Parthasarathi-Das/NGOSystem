<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Hope{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  {% block extra_css %}{% endblock %}
</head>

<body>

  <header class="topnav">
    <div class="topnav-inner">
      <a href="/" class="brand">
        <span class="brand-mark">
          <img src="{{ url_for('static', filename='logo.png') }}" alt="Hope Logo">
        </span>
        <span class="brand-text">
          <span>
            <b>H</b>
            <b style="color:#4a7a0b;">O</b>
            <b>P</b>
            <b>E</b>
          </span>
          <small>Helping People - Offering Hope - Empowering Lives</small>
        </span>
      </a>
      <nav class="nav-links">
        <a class="nav-link {% block nav_home %}{% endblock %}" href="/">Home</a>
        <a class="nav-link {% block nav_gallery %}{% endblock %}" href="/gallery">Gallery</a>
        <a class="nav-link {% block nav_help %}{% endblock %}" href="/needhelp">Need Help</a>
        <a class="nav-link {% block nav_donate %}{% endblock %}" href="/joinus">Donate</a>
        <a class="nav-link {% block nav_admin %}{% endblock %}" href="/admin"
          style="color:var(--amber);font-weight:600">Admin</a>
      </nav>
    </div>
  </header>

  {% block hero %}{% endblock %}

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer
    style="background:var(--slate-900);color:var(--slate-400);text-align:center;padding:20px;font-size:.85rem;margin-top:60px;">
    &copy; 2025 Hope — West Bengal Crisis Relief &amp; Smart Allocation
  </footer>

  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>

</html>
