<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · NGO Unified System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body { min-height:100vh; display:grid; place-items:center; background:var(--slate-100); }
    .login-card {
      background:white; border-radius:var(--radius-xl); box-shadow:var(--shadow-xl);
      padding:48px 40px; width:100%; max-width:400px; text-align:center;
    }
    .login-icon { font-size:3rem; margin-bottom:16px; }
    .login-card h1 { font-size:1.5rem; font-weight:800; color:var(--navy); margin-bottom:6px; }
    .login-card p  { color:var(--slate-500); margin-bottom:28px; font-size:.9rem; }
    input[type=password] {
      width:100%; padding:12px 16px; border:1.5px solid var(--slate-200);
      border-radius:var(--radius-md); font-size:1rem; margin-bottom:16px;
    }
    input:focus { outline:none; border-color:var(--navy-light); }
    .login-btn {
      width:100%; padding:13px; background:var(--navy); color:white;
      border:none; border-radius:50px; font-size:1rem; font-weight:700;
      cursor:pointer; transition:background .15s;
    }
    .login-btn:hover { background:var(--navy-dark); }
    .error-msg { background:var(--red-soft); color:var(--red); padding:10px 14px;
                 border-radius:var(--radius-md); font-weight:600; margin-bottom:16px; font-size:.9rem; }
    .back-link { display:block; margin-top:20px; color:var(--slate-500); font-size:.88rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h1>Admin Access</h1>
    <p>Enter the admin password to continue.</p>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/admin/login">
      <input type="password" name="password" placeholder="Admin password" autofocus required>
      <button type="submit" class="login-btn">Login →</button>
    </form>
    <a href="/" class="back-link">← Back to Home</a>
  </div>
</body>
</html>
