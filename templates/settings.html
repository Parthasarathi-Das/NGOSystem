<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | NGO System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .settings-card {
            border: none;
            border-radius: 12px;
        }

        .nav-pills .nav-link.active {
            background-color: #198754;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">NGO<span class="text-success">SYSTEM</span></a>
            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="card settings-card shadow-sm p-3">
                    <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
                        <button class="nav-link active text-start mb-2" data-bs-toggle="pill"
                            data-bs-target="#profile-tab">
                            <i class="fas fa-user-edit me-2"></i> Edit Profile
                        </button>
                        <button class="nav-link text-start" data-bs-toggle="pill" data-bs-target="#security-tab">
                            <i class="fas fa-shield-alt me-2"></i> Password & Security
                        </button>
                        <button class="nav-link text-start" data-bs-toggle="pill" data-bs-target="#delete-tab">
                            <i class="fas fa-exclamation-triangle me-2"></i> Delete Account
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="tab-content" id="v-pills-tabContent">

                    <div class="tab-pane fade show active" id="profile-tab">
                        <div class="card settings-card shadow-sm p-4 mb-4">
                            <h4 class="fw-bold mb-4">Profile Settings</h4>


                            <form onsubmit="handleProfileUpdate(event)">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Full Name</label>
                                        <input type="text" class="form-control" id="setFullName"
                                            placeholder="Loading...">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Phone Number</label>
                                        <input type="tel" class="form-control" id="setPhone" placeholder="Loading...">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Profession</label>
                                        <input type="text" class="form-control" id="setProfession">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">District</label>
                                        <select class="form-select" id="setDistrict">
                                            <option>Kolkata</option>
                                            <option>North 24 Parganas</option>
                                            <option>South 24 Parganas</option>
                                            <option>Howrah</option>
                                            <option>Hooghly</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label small fw-bold">Address</label>
                                        <textarea class="form-control" id="setAddress" rows="2"></textarea>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">PIN Code</label>
                                        <input type="text" class="form-control" id="setPin">
                                    </div>
                                </div>
                                <hr class="my-4">
                                <button type="submit" class="btn btn-success px-5 fw-bold">Save All Changes</button>
                            </form>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="security-tab">
                        <div class="card settings-card shadow-sm p-4">
                            <h4 class="fw-bold mb-4">Change Password</h4>
                            <form onsubmit="handlePasswordUpdate(event)">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Current Password</label>
                                    <input id="currPw" type="password" class="form-control"
                                        placeholder="Enter current password" required>
                                    <div class="mt-2">
                                        <a href="/forgot-password"
                                            class="text-success small fw-bold text-decoration-none">Forgot Password?</a>
                                    </div>
                                </div>
                                <div class="row g-3 mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">New Password</label>
                                        <input id="newPw" type="password" class="form-control"
                                            placeholder="New password" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Confirm New Password</label>
                                        <input id="confNewPw" type="password" class="form-control"
                                            placeholder="Repeat new password" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-dark px-5 fw-bold">Update Password</button>
                            </form>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="delete-tab">
                        <div class="card settings-card shadow-sm p-4 border-danger">
                            <h4 class="fw-bold text-danger mb-4">Delete Account</h4>

                            <p class="text-muted small">
                                Once you delete your account, there is no going back. Please be certain.
                            </p>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Type your email to confirm</label>
                                <input type="email" id="confirmDeleteEmail" class="form-control border-danger"
                                    placeholder="Enter your email">
                            </div>

                            <button class="btn btn-danger fw-bold" onclick="deleteAccount()">
                                <i class="fas fa-exclamation-triangle me-2"></i> Delete My Account
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Extract the token from the URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            // 2. Redirect if the token is missing from the URL
            if (!token) {
                window.location.replace("/signin");
                return;
            }

            try {
                // 3. Fetch the donor profile data using the token
                const response = await fetch('/get-donor-profile', {
                    method: 'GET',
                    headers: {
                        'Authorization': token // Matches your Flask request.headers.get('Authorization')
                    }
                });

                if (response.ok) {
                    const data = await response.json();

                    // 4. Fill the form fields with data from the response
                    // These IDs must match the ones in your settings.html form
                    if (document.getElementById('setFullName')) document.getElementById('setFullName').value = data.full_name;
                    if (document.getElementById('setPhone')) document.getElementById('setPhone').value = data.phone;
                    if (document.getElementById('setProfession')) document.getElementById('setProfession').value = data.profession;
                    if (document.getElementById('setDistrict')) document.getElementById('setDistrict').value = data.district;
                    if (document.getElementById('setAddress')) document.getElementById('setAddress').value = data.address;
                    if (document.getElementById('setPin')) document.getElementById('setPin').value = data.pincode;
                } else {
                    // Handle unauthorized or expired sessions
                    const errorData = await response.json();
                    alert(errorData.error || "Failed to load settings.");
                    window.location.replace("/signin");
                }
            } catch (err) {
                console.error("Settings load error:", err);
                alert("An error occurred while loading your profile.");
            }
        });
        async function handleProfileUpdate(event) {
            event.preventDefault(); // Stop the page from refreshing

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                alert("Unauthorized access. Please sign in again.");
                window.location.replace("/signin");
                return;
            }

            // 1. Get raw values for validation
            const cleanPhone = document.getElementById('setPhone').value.trim();
            const rawPincode = document.getElementById('setPin').value.trim();

            // 2. Validation Logic
            // Phone: Must be 10 digits (after removing +91- if present) and start with 6-9

            const phoneRegex = /^[6-9]\d{9}$/;

            if (!phoneRegex.test(cleanPhone)) {
                alert("Error: Please enter a valid 10-digit phone number starting with 6, 7, 8, or 9.");
                return;
            }

            // Pincode: Exactly 6 digits starting with 7 (West Bengal)
            const pinRegex = /^7\d{5}$/;
            if (!pinRegex.test(rawPincode)) {
                alert("Error: Please enter a valid 6-digit West Bengal Pincode starting with 7.");
                return;
            }

            // 3. Construct the data object if validation passes
            const userData = {
                fullName: document.getElementById('setFullName').value.trim(),
                phone: cleanPhone,
                profession: document.getElementById('setProfession').value.trim(),
                address: document.getElementById('setAddress').value.trim(),
                district: document.getElementById('setDistrict').value,
                pincode: rawPincode
            };

            try {
                const response = await fetch('/update-donor-profile', {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                } else {
                    alert(result.error || "Failed to update profile.");
                    if (response.status === 401) {
                        window.location.replace("/signin");
                    }
                }
            } catch (err) {
                console.error("Update Error:", err);
                alert("An error occurred. Check your connection.");
            }
        }

        // --- DELETE ACCOUNT LOGIC ---
        async function deleteAccount() {
            const emailInput = document.getElementById('confirmDeleteEmail').value.trim();
            if (!emailInput) {
                alert("Please enter your email to confirm deletion.");
                return;
            }

            if (!confirm("CRITICAL: This will permanently delete your donor record. Proceed?")) return;

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            try {
                const response = await fetch('/delete-donor-account', {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: emailInput })
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Account deleted successfully. We are sorry to see you go.");
                    localStorage.clear();
                    sessionStorage.clear();
                    window.location.replace("/signin");
                } else {
                    alert(result.error || "Could not delete account. Check your email spelling.");
                }
            } catch (err) {
                alert("Connection error during deletion.");
            }
        }

        async function handlePasswordUpdate(event) {
            event.preventDefault();

            const currentPassword = document.getElementById('currPw').value;
            const newPassword = document.getElementById('newPw').value;
            const confirmPassword = document.getElementById('confNewPw').value;

            // 1. Client-side Validation
            if (newPassword !== confirmPassword) {
                alert("Error: New passwords do not match.");
                return;
            }

            if (newPassword.length < 8) {
                alert("Error: Password must be at least 8 characters long.");
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            try {
                const response = await fetch('/update-old-password', {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        currentPassword: currentPassword,
                        newPassword: newPassword
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                    event.target.reset(); // Clear the form on success
                } else {
                    alert(result.error || "Failed to update password.");
                }
            } catch (err) {
                console.error("Password Update Error:", err);
                alert("An error occurred. Please check your connection.");
            }
        }
    </script>
</body>

</html>
